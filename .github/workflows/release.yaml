name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            pkg-config \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev \
            libfreetype6-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            patchelf

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pysdl2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build toolchain image
        run: |
          docker build -t crossmix-toolchain ./tools/toolchain --platform linux/arm64

      - name: Cross-compile binary inside toolchain
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          USER_ID=$(id -u)
          GROUP_ID=$(id -g)
          docker run --rm --platform linux/arm64 \
            -u $USER_ID:$GROUP_ID \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace \
            crossmix-toolchain \
            bash -lc "python3 -m pip install -r requirements.txt && pyinstaller --onefile --noconsole --name EmuDrop main.py"

      - name: Package Trimui Brick variants
        shell: bash
        run: |
          set -euo pipefail
          release_dir="dist/release"
          mkdir -p "${release_dir}"

          for variant in "EmuDrop" "EmuDropKnulli"; do
            cp dist/EmuDrop "platform/Trimui Brick/${variant}/EmuDrop"
            (
              cd "platform/Trimui Brick"
              zip -r "../../${release_dir}/${variant}.zip" "${variant}"
            )
          done
          for variant in "EmuDropStockOS"; do
            cp dist/EmuDrop "platform/Trimui Brick/${variant}/EmuDrop"
            (
              cd "platform/Trimui Brick"
              tar -czf "../../dist/release/EmuDropStockOS.tar.gz" "EmuDropStockOS"
            )
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.zip
            dist/release/*.tar.gz
